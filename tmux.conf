# Remap prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support (scroll, click panes, resize)
set -g mouse on

# Start window/pane numbering at 1 (0 is far away)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Reduce escape delay (important for vim/neovim)
set -sg escape-time 0

# Enable focus events (needed for vim autoread)
set-option -g focus-events on

# Enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Status bar styling
set -g status-position top
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=cyan,bold] #S "
set -g status-right "#[fg=white]%H:%M "
set -g status-left-length 30
set -g window-status-format "#[fg=gray] #I:#W "
set -g window-status-current-format "#[fg=cyan,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=gray"
set -g pane-active-border-style "fg=cyan"
